<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Eden</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="login-card">
                <h1 style="color: #059669; text-align: center; margin-bottom: 10px;">🌿 Eden</h1>
                <p style="text-align: center; color: #6b7280; margin-bottom: 30px;">Change Your Password</p>
                <p style="text-align: center; color: #dc2626; margin-bottom: 20px; font-size: 0.9em;">
                    You must change your default password before continuing.
                </p>
                
                <form id="changePasswordForm">
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="newPassword" required placeholder="Enter new password (min 6 characters)" minlength="6">
                    </div>
                    
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPassword" required placeholder="Confirm new password">
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Change Password</button>
                </form>
            </div>
        </div>
    </div>

    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #374151;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #10b981;
        }
    </style>

    <script>
        // Check if user is logged in
        const token = localStorage.getItem('eden_token');
        if (!token) {
            window.location.href = '/login';
        }

        document.getElementById('changePasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }
            
            if (newPassword.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }
            
            fetch('/api/admin/change-password', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ 
                    new_password: newPassword
                })
            })
            .then(res => {
                if (!res.ok) {
                    throw new Error('Failed to change password');
                }
                return res.json();
            })
            .then(data => {
                if (data.success) {
                    alert('Password changed successfully!');
                    
                    const role = localStorage.getItem('eden_role');
                    if (role === 'super_admin') {
                        window.location.href = '/super-admin';
                    } else {
                        window.location.href = '/admin';
                    }
                } else {
                    alert('Failed to change password: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(err => {
                console.error('Change password error:', err);
                alert('Error: ' + err.message);
            });
        });
    </script>
</body>
</html>
