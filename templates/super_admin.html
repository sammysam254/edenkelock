<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - Eden</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌿 Super Admin Panel</h1>
            <p>Manage administrators and enroll devices</p>
            <div class="nav">
                <a href="/">Home</a>
                <a href="/super-admin">Super Admin</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Admins</h3>
                <div class="value" id="totalAdmins">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Devices</h3>
                <div class="value" id="totalDevices">0</div>
            </div>
            <div class="stat-card">
                <h3>Active Devices</h3>
                <div class="value" id="activeDevices">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Revenue</h3>
                <div class="value" id="totalRevenue">$0.00</div>
            </div>
        </div>

        <div class="card">
            <h2 style="color: #059669; margin-bottom: 20px;">Create Administrator Account</h2>
            <form id="createAdminForm" style="max-width: 600px;">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="adminEmail" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="adminPassword" required>
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="adminName" required>
                </div>
                <button type="submit" class="btn btn-primary">Create Administrator</button>
            </form>
        </div>

        <div class="card">
            <h2 style="color: #059669; margin-bottom: 20px;">Enroll New Device</h2>
            <form id="enrollDeviceForm" style="max-width: 600px;">
                <div class="form-group">
                    <label>Device ID</label>
                    <input type="text" id="deviceId" required placeholder="DEV001">
                </div>
                <div class="form-group">
                    <label>Customer ID</label>
                    <input type="text" id="customerId" required placeholder="CUST001">
                </div>
                <div class="form-group">
                    <label>Total Amount ($)</label>
                    <input type="number" id="totalAmount" required step="0.01" placeholder="1000.00">
                </div>
                <div class="form-group">
                    <label>Initial Payment ($)</label>
                    <input type="number" id="initialPayment" value="0" step="0.01" placeholder="0.00">
                </div>
                <button type="submit" class="btn btn-primary">Enroll Device</button>
            </form>
        </div>

        <div class="card">
            <h2 style="color: #059669; margin-bottom: 20px;">Administrators</h2>
            <table id="adminsTable">
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="adminsBody">
                    <tr><td colspan="5" style="text-align: center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <style>
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #374151;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1em;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #10b981;
        }
    </style>

    <script>
        // Check authentication
        const token = localStorage.getItem('eden_token');
        const user = JSON.parse(localStorage.getItem('eden_user') || '{}');
        
        if (!token || user.role !== 'super_admin') {
            window.location.href = '/login';
        }

        // Load stats
        fetch('/api/stats', {
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('totalDevices').textContent = data.totalDevices || 0;
            document.getElementById('activeDevices').textContent = data.activeDevices || 0;
            document.getElementById('totalRevenue').textContent = '$' + (data.totalRevenue || 0).toFixed(2);
        });

        // Load admins
        fetch('/api/auth/admins', {
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(res => res.json())
        .then(admins => {
            document.getElementById('totalAdmins').textContent = admins.length;
            const tbody = document.getElementById('adminsBody');
            if (admins.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No administrators found</td></tr>';
                return;
            }
            tbody.innerHTML = admins.map(admin => `
                <tr>
                    <td>${admin.email}</td>
                    <td>${admin.full_name || 'N/A'}</td>
                    <td><span class="status-badge status-active">${admin.role}</span></td>
                    <td>${new Date(admin.created_at).toLocaleDateString()}</td>
                    <td>
                        <button class="btn btn-danger btn-small" onclick="deleteAdmin('${admin.id}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        });

        // Create admin
        document.getElementById('createAdminForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            fetch('/api/auth/create-admin', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({
                    email: document.getElementById('adminEmail').value,
                    password: document.getElementById('adminPassword').value,
                    full_name: document.getElementById('adminName').value
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('Administrator created successfully!');
                    location.reload();
                } else {
                    alert('Error: ' + (data.error || 'Unknown error'));
                }
            });
        });

        // Enroll device
        document.getElementById('enrollDeviceForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            fetch('/api/devices/enroll', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({
                    device_id: document.getElementById('deviceId').value,
                    customer_id: document.getElementById('customerId').value,
                    total_amount: parseFloat(document.getElementById('totalAmount').value),
                    amount_paid: parseFloat(document.getElementById('initialPayment').value)
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('Device enrolled successfully!');
                    document.getElementById('enrollDeviceForm').reset();
                } else {
                    alert('Error: ' + (data.error || 'Unknown error'));
                }
            });
        });

        function deleteAdmin(adminId) {
            if (!confirm('Are you sure you want to delete this administrator?')) return;
            
            fetch(`/api/auth/admins/${adminId}`, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('Administrator deleted');
                    location.reload();
                } else {
                    alert('Error: ' + (data.error || 'Unknown error'));
                }
            });
        }

        function logout() {
            localStorage.removeItem('eden_token');
            localStorage.removeItem('eden_user');
            window.location.href = '/login';
        }
    </script>
</body>
</html>
