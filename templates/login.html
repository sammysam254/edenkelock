<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eden</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="login-card">
                <h1 style="color: #059669; text-align: center; margin-bottom: 10px;">🌿 Eden</h1>
                <p style="text-align: center; color: #6b7280; margin-bottom: 30px;">Admin Login</p>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" required placeholder="Enter your email">
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" required placeholder="Enter your password">
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                </form>
                
                <p style="text-align: center; margin-top: 20px; color: #6b7280; font-size: 0.9em;">
                    <a href="/" style="color: #059669;">Back to Home</a> | 
                    <a href="/register" style="color: #059669;">Register Account</a>
                </p>
            </div>
        </div>
    </div>

    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #374151;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #10b981;
        }
    </style>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Use email as username for the API
            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    username: email, 
                    password: password 
                })
            })
            .then(res => {
                if (!res.ok) {
                    throw new Error('Login failed');
                }
                return res.json();
            })
            .then(data => {
                if (data.success) {
                    localStorage.setItem('eden_token', data.token);
                    localStorage.setItem('eden_role', data.role);
                    localStorage.setItem('eden_admin_id', data.admin_id);
                    
                    // Check if password must be changed
                    if (data.must_change_password) {
                        window.location.href = '/change-password';
                        return;
                    }
                    
                    if (data.role === 'super_admin') {
                        window.location.href = '/super-admin';
                    } else {
                        window.location.href = '/admin';
                    }
                } else {
                    alert('Login failed: ' + (data.error || 'Invalid credentials'));
                }
            })
            .catch(err => {
                console.error('Login error:', err);
                alert('Login error: ' + err.message);
            });
        });
    </script>
</body>
</html>
