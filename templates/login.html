<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eden</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="login-card">
                <h1 style="color: #059669; text-align: center; margin-bottom: 10px;">🌿 Eden</h1>
                <p style="text-align: center; color: #6b7280; margin-bottom: 30px;">Admin Login</p>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" required placeholder="Enter your email">
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" required placeholder="Enter your password">
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                </form>
                
                <p style="text-align: center; margin-top: 20px; color: #6b7280; font-size: 0.9em;">
                    <a href="/" style="color: #059669;">Back to Home</a> | 
                    <a href="/register" style="color: #059669;">Register Account</a>
                </p>
            </div>
        </div>
    </div>

    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #374151;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #10b981;
        }
    </style>

    <script>
        // Generate browser fingerprint
        function generateBrowserFingerprint() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.textBaseline = 'top';
            ctx.font = '14px Arial';
            ctx.fillText('Browser fingerprint', 2, 2);
            
            const fingerprint = [
                navigator.userAgent,
                navigator.language,
                screen.width + 'x' + screen.height,
                new Date().getTimezoneOffset(),
                canvas.toDataURL()
            ].join('|');
            
            return btoa(fingerprint).substring(0, 32);
        }
        
        // Try auto-login on page load
        window.addEventListener('load', function() {
            const persistentToken = localStorage.getItem('eden_persistent_token');
            const browserFingerprint = generateBrowserFingerprint();
            
            if (persistentToken) {
                console.log('Attempting auto-login...');
                
                fetch('/api/auth/admin-auto-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        persistent_token: persistentToken,
                        browser_fingerprint: browserFingerprint
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        console.log('Auto-login successful');
                        
                        // Save session data
                        localStorage.setItem('eden_token', persistentToken);
                        localStorage.setItem('eden_role', data.role);
                        localStorage.setItem('eden_admin_id', data.admin_id);
                        localStorage.setItem('eden_email', data.email);
                        
                        // Check if password must be changed
                        if (data.must_change_password) {
                            window.location.href = '/change-password';
                            return;
                        }
                        
                        // Redirect based on role
                        if (data.role === 'super_admin') {
                            window.location.href = '/super-admin';
                        } else {
                            window.location.href = '/admin';
                        }
                    } else {
                        console.log('Auto-login failed:', data.error);
                        // Clear invalid token
                        localStorage.removeItem('eden_persistent_token');
                    }
                })
                .catch(err => {
                    console.error('Auto-login error:', err);
                    localStorage.removeItem('eden_persistent_token');
                });
            }
        });
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const browserFingerprint = generateBrowserFingerprint();
            
            // Use persistent login endpoint
            fetch('/api/auth/admin-persistent-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email: email, 
                    password: password,
                    browser_fingerprint: browserFingerprint
                })
            })
            .then(res => {
                if (!res.ok) {
                    throw new Error('Login failed');
                }
                return res.json();
            })
            .then(data => {
                if (data.success) {
                    // Save persistent token
                    localStorage.setItem('eden_persistent_token', data.persistent_token);
                    localStorage.setItem('eden_token', data.persistent_token);
                    localStorage.setItem('eden_role', data.role);
                    localStorage.setItem('eden_admin_id', data.admin_id);
                    localStorage.setItem('eden_email', data.email);
                    
                    console.log('Login successful with persistent session (expires in ' + data.expires_in_days + ' days)');
                    
                    // Check if password must be changed
                    if (data.must_change_password) {
                        window.location.href = '/change-password';
                        return;
                    }
                    
                    if (data.role === 'super_admin') {
                        window.location.href = '/super-admin';
                    } else {
                        window.location.href = '/admin';
                    }
                } else {
                    alert('Login failed: ' + (data.error || 'Invalid credentials'));
                }
            })
            .catch(err => {
                console.error('Login error:', err);
                alert('Login error: ' + err.message);
            });
        });
    </script>
</body>
</html>
