<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - Eden</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌿 My Dashboard</h1>
            <p>View your device and payment information</p>
            <div class="nav">
                <a href="/dashboard">Dashboard</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>

        <div class="card">
            <h2 style="color: #059669; margin-bottom: 20px;">Device & Loan Information</h2>
            
            <div class="loan-info">
                <div class="info-item">
                    <label>Device ID</label>
                    <div class="amount" id="deviceId" style="font-size: 1.2em;">-</div>
                </div>
                <div class="info-item">
                    <label>Device Status</label>
                    <div class="amount" id="deviceStatus">-</div>
                </div>
                <div class="info-item">
                    <label>Total Loan Amount</label>
                    <div class="amount" id="totalAmount">KES 0</div>
                </div>
                <div class="info-item">
                    <label>Amount Paid</label>
                    <div class="amount" id="amountPaid" style="color: #059669;">KES 0</div>
                </div>
                <div class="info-item">
                    <label>Remaining Balance</label>
                    <div class="amount" id="balance" style="color: #ef4444;">KES 0</div>
                </div>
                <div class="info-item">
                    <label>Customer Name</label>
                    <div class="amount" id="customerName" style="font-size: 1.2em;">-</div>
                </div>
            </div>

            <h3 style="color: #059669; margin: 25px 0 15px 0;">Payment Progress</h3>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar" style="width: 0%">0%</div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary" onclick="makePayment()">💳 Make Payment</button>
                <button class="btn" style="background: #6b7280; color: white;" onclick="viewHistory()">📜 Payment History</button>
            </div>
        </div>

        <div class="card payment-history" id="paymentHistory" style="display: none;">
            <h2 style="color: #059669; margin-bottom: 20px;">Payment History</h2>
            <div id="historyList">
                <p style="color: #6b7280;">No payment history available</p>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('eden_customer_token');
        const phone = localStorage.getItem('eden_customer_phone');
        
        if (!token || !phone) {
            window.location.href = '/customer-login';
        }

        fetch(`/api/customer/dashboard?phone=${phone}`, {
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                alert('Session expired. Please login again.');
                window.location.href = '/customer-login';
                return;
            }
            
            const device = data.device;
            const balance = device.total_amount - device.amount_paid;
            const progress = (device.amount_paid / device.total_amount) * 100;

            document.getElementById('deviceId').textContent = device.device_id;
            document.getElementById('deviceStatus').textContent = device.status.toUpperCase();
            document.getElementById('deviceStatus').style.color = device.status === 'active' ? '#059669' : '#ef4444';
            document.getElementById('totalAmount').textContent = 'KES ' + parseFloat(device.total_amount).toLocaleString();
            document.getElementById('amountPaid').textContent = 'KES ' + parseFloat(device.amount_paid).toLocaleString();
            document.getElementById('balance').textContent = 'KES ' + balance.toLocaleString();
            document.getElementById('customerName').textContent = device.customer_name || 'N/A';
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressBar').textContent = progress.toFixed(0) + '%';
        })
        .catch(err => {
            alert('Error loading dashboard');
            console.error(err);
        });

        function makePayment() {
            alert('Payment feature coming soon! Contact administrator to make payment.');
        }

        function viewHistory() {
            const historyDiv = document.getElementById('paymentHistory');
            if (historyDiv.style.display === 'none') {
                historyDiv.style.display = 'block';
                loadPaymentHistory();
            } else {
                historyDiv.style.display = 'none';
            }
        }

        function loadPaymentHistory() {
            fetch(`/api/customer/payments?phone=${phone}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(res => res.json())
            .then(payments => {
                if (!payments || payments.length === 0) {
                    document.getElementById('historyList').innerHTML = '<p style="color: #6b7280;">No payment history available</p>';
                    return;
                }
                
                const historyHTML = payments.map(p => `
                    <div class="payment-item">
                        <span class="date">${new Date(p.created_at).toLocaleDateString('en-KE', {timeZone: 'Africa/Nairobi'})}</span>
                        <span class="amount">KES ${parseFloat(p.amount).toLocaleString()}</span>
                    </div>
                `).join('');

                document.getElementById('historyList').innerHTML = historyHTML;
            })
            .catch(err => {
                document.getElementById('historyList').innerHTML = '<p style="color: #ef4444;">Error loading payment history</p>';
            });
        }

        function logout() {
            localStorage.removeItem('eden_customer_token');
            localStorage.removeItem('eden_customer_phone');
            window.location.href = '/customer-login';
        }
    </script>
</body>
</html>
