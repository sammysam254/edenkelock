<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Eden</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌿 User Dashboard</h1>
            <p>Manage your device and payments</p>
            <div class="nav">
                <a href="/">Home</a>
                <a href="/dashboard">Dashboard</a>
                <a href="/admin">Admin</a>
            </div>
        </div>

        <div class="card">
            <h2 style="color: #059669; margin-bottom: 20px;">Loan Information</h2>
            
            <div class="loan-info">
                <div class="info-item">
                    <label>Total Loan Amount</label>
                    <div class="amount" id="totalAmount">$0.00</div>
                </div>
                <div class="info-item">
                    <label>Amount Paid</label>
                    <div class="amount" id="amountPaid">$0.00</div>
                </div>
                <div class="info-item">
                    <label>Remaining Balance</label>
                    <div class="amount" id="balance">$0.00</div>
                </div>
                <div class="info-item">
                    <label>Device Status</label>
                    <div class="amount" id="deviceStatus">Active</div>
                </div>
            </div>

            <h3 style="color: #059669; margin: 25px 0 15px 0;">Payment Progress</h3>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar" style="width: 0%">0%</div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary" onclick="makePayment()">💳 Pay Now</button>
                <button class="btn btn-danger" onclick="viewHistory()">📜 Payment History</button>
            </div>
        </div>

        <div class="card payment-history" id="paymentHistory" style="display: none;">
            <h2 style="color: #059669; margin-bottom: 20px;">Payment History</h2>
            <div id="historyList">
                <p style="color: #6b7280;">No payment history available</p>
            </div>
        </div>
    </div>

    <script>
        // Get device ID from URL parameter or use default
        const urlParams = new URLSearchParams(window.location.search);
        const deviceId = urlParams.get('device') || 'DEV001';

        // Load device data from API
        fetch(`/api/devices/${deviceId}`)
            .then(res => res.json())
            .then(device => {
                if (device.error) {
                    alert('Device not found');
                    return;
                }
                
                const balance = device.total_amount - device.amount_paid;
                const progress = (device.amount_paid / device.total_amount) * 100;

                document.getElementById('totalAmount').textContent = '$' + device.total_amount.toFixed(2);
                document.getElementById('amountPaid').textContent = '$' + device.amount_paid.toFixed(2);
                document.getElementById('balance').textContent = '$' + balance.toFixed(2);
                document.getElementById('deviceStatus').textContent = device.status.toUpperCase();
                document.getElementById('deviceStatus').style.color = device.status === 'active' ? '#059669' : '#ef4444';
                document.getElementById('progressBar').style.width = progress + '%';
                document.getElementById('progressBar').textContent = progress.toFixed(0) + '%';
            })
            .catch(err => {
                console.error('Error loading device:', err);
                alert('Error loading device data');
            });

        function makePayment() {
            const amount = prompt('Enter payment amount:');
            if (!amount || isNaN(amount)) return;
            
            fetch('/api/payments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    device_id: deviceId,
                    amount: parseFloat(amount),
                    payment_method: 'manual'
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('Payment recorded successfully!');
                    location.reload();
                } else {
                    alert('Error: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(err => alert('Error: ' + err.message));
        }

        function viewHistory() {
            const historyDiv = document.getElementById('paymentHistory');
            if (historyDiv.style.display === 'none') {
                historyDiv.style.display = 'block';
                loadPaymentHistory();
            } else {
                historyDiv.style.display = 'none';
            }
        }

        function loadPaymentHistory() {
            fetch(`/api/payments/${deviceId}`)
                .then(res => res.json())
                .then(payments => {
                    if (payments.length === 0) {
                        document.getElementById('historyList').innerHTML = '<p style="color: #6b7280;">No payment history available</p>';
                        return;
                    }
                    
                    const historyHTML = payments.map(p => `
                        <div class="payment-item">
                            <span class="date">${new Date(p.created_at).toLocaleDateString()}</span>
                            <span class="amount">$${parseFloat(p.amount).toFixed(2)}</span>
                        </div>
                    `).join('');

                    document.getElementById('historyList').innerHTML = historyHTML;
                })
                .catch(err => {
                    document.getElementById('historyList').innerHTML = '<p style="color: #ef4444;">Error loading payment history</p>';
                });
        }
    </script>
</body>
</html>
