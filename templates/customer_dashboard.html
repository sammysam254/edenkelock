<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - Eden</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            min-height: 100vh;
            padding: 10px;
            color: #333;
        }
        
        .dashboard-container {
            max-width: 400px;
            margin: 0 auto;
            padding: 10px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 12px;
        }
        
        .card-item {
            background: white;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .card-label {
            font-size: 11px;
            color: #6b7280;
            margin-bottom: 4px;
            font-weight: 500;
        }
        
        .card-value {
            font-size: 16px;
            font-weight: 700;
            color: #10b981;
        }
        
        .card-value.status {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .card-value.amount {
            font-size: 18px;
        }
        
        .card-value.balance {
            color: #dc2626;
            font-size: 20px;
        }
        
        .card-value.name {
            font-size: 14px;
            color: #059669;
            text-transform: lowercase;
        }
        
        .progress-section {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .progress-title {
            font-size: 14px;
            font-weight: 600;
            color: #10b981;
            margin-bottom: 8px;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #f3f4f6;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #059669);
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            font-size: 12px;
            color: #10b981;
            font-weight: 600;
        }
        
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 12px 8px;
            border: none;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .btn-primary {
            background: #10b981;
            color: white;
        }
        
        .btn-primary:hover {
            background: #059669;
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: #f59e0b;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #d97706;
            transform: translateY(-1px);
        }
        
        .btn-tertiary {
            background: #6b7280;
            color: white;
        }
        
        .btn-tertiary:hover {
            background: #4b5563;
            transform: translateY(-1px);
        }
        
        .btn-icon {
            font-size: 16px;
        }
        
        .footer {
            text-align: center;
            padding: 16px;
            color: white;
            font-size: 10px;
            opacity: 0.8;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }
        
        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        @media (max-width: 360px) {
            .dashboard-container {
                padding: 5px;
            }
            
            .card-item {
                padding: 10px;
            }
            
            .card-value {
                font-size: 14px;
            }
            
            .card-value.amount {
                font-size: 16px;
            }
            
            .card-value.balance {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div id="loading" class="loading">
            <h2>Loading...</h2>
        </div>
        
        <div id="dashboard" style="display: none;">
            <!-- Device Info Grid -->
            <div class="card-grid">
                <div class="card-item">
                    <div class="card-label">Device ID</div>
                    <div class="card-value" id="deviceId">EDN800/01</div>
                </div>
                <div class="card-item">
                    <div class="card-label">Device Status</div>
                    <div class="card-value status" id="deviceStatus">ACTIVE</div>
                </div>
            </div>
            
            <!-- Loan Info Grid -->
            <div class="card-grid">
                <div class="card-item">
                    <div class="card-label">Total Loan Amount</div>
                    <div class="card-value amount" id="totalLoan">KES<br>20,000</div>
                </div>
                <div class="card-item">
                    <div class="card-label">Amount Paid</div>
                    <div class="card-value amount" id="amountPaid">KES<br>2,000</div>
                </div>
            </div>
            
            <!-- Balance & Customer Grid -->
            <div class="card-grid">
                <div class="card-item">
                    <div class="card-label">Remaining Balance</div>
                    <div class="card-value balance" id="loanBalance">KES<br>18,000</div>
                </div>
                <div class="card-item">
                    <div class="card-label">Customer Name</div>
                    <div class="card-value name" id="customerName">samson<br>matata<br>mwinzi</div>
                </div>
            </div>
            
            <!-- Payment Progress -->
            <div class="progress-section">
                <div class="progress-title">Payment Progress</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 10%"></div>
                </div>
                <div class="progress-text" id="progressText">10%</div>
            </div>
            
            <!-- Action Buttons -->
            <div class="button-grid">
                <button class="btn btn-primary" onclick="unlockDevice()">
                    <span class="btn-icon">🔓</span>
                    <span>Unlock Device</span>
                </button>
                <button class="btn btn-secondary" onclick="makePayment()">
                    <span class="btn-icon">💳</span>
                    <span>Make Payment</span>
                </button>
                <button class="btn btn-tertiary" onclick="showHistory()">
                    <span class="btn-icon">📋</span>
                    <span>Payment History</span>
                </button>
            </div>
        </div>
        
        <div id="error" style="display: none;">
            <div class="error">
                <p id="errorMessage">Unable to load dashboard</p>
            </div>
            <button class="btn btn-primary" onclick="location.reload()" style="width: 100%; margin-bottom: 8px;">Retry</button>
            <button class="btn btn-tertiary" onclick="logout()" style="width: 100%;">Logout</button>
        </div>
        
        <div class="footer">
            Contact Sam 0706499848 for softwares and AI tools
        </div>
    </div>

    <script>
        const customerPhone = localStorage.getItem('eden_customer_phone');
        const deviceId = localStorage.getItem('eden_device_id');
        
        if (!customerPhone) {
            window.location.href = '/customer-login';
        }
        
        async function loadDashboard() {
            try {
                const response = await fetch(`/api/customer/dashboard?phone=${encodeURIComponent(customerPhone)}`);
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error || 'Failed to load dashboard');
                }
                
                // Update device info
                if (data.device) {
                    document.getElementById('deviceId').textContent = data.device.device_id || 'EDN800/01';
                    
                    const statusElement = document.getElementById('deviceStatus');
                    if (data.device.is_locked) {
                        statusElement.textContent = 'LOCKED';
                        statusElement.style.color = '#dc2626';
                    } else {
                        statusElement.textContent = 'ACTIVE';
                        statusElement.style.color = '#10b981';
                    }
                }
                
                // Update loan info
                const balance = parseFloat(data.customer.loan_balance || 0);
                const total = parseFloat(data.customer.total_loan_amount || 0);
                const paid = total - balance;
                const progress = total > 0 ? Math.round((paid / total) * 100) : 0;
                
                document.getElementById('totalLoan').innerHTML = `KES<br>${total.toLocaleString()}`;
                document.getElementById('amountPaid').innerHTML = `KES<br>${paid.toLocaleString()}`;
                document.getElementById('loanBalance').innerHTML = `KES<br>${balance.toLocaleString()}`;
                
                // Update customer name
                const customerName = data.customer.full_name || data.customer.customer_name || 'Customer';
                const nameParts = customerName.toLowerCase().split(' ');
                document.getElementById('customerName').innerHTML = nameParts.join('<br>');
                
                // Update progress
                document.getElementById('progressFill').style.width = `${progress}%`;
                document.getElementById('progressText').textContent = `${progress}%`;
                
                // Show dashboard
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                
            } catch (error) {
                console.error('Dashboard error:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('errorMessage').textContent = error.message;
            }
        }
        
        function unlockDevice() {
            alert('Device unlock requested. Please wait for admin approval.');
        }
        
        function makePayment() {
            alert('Payment feature coming soon. Please contact support for payments.');
        }
        
        function showHistory() {
            alert('Payment history feature coming soon.');
        }
        
        function logout() {
            localStorage.removeItem('eden_customer_token');
            localStorage.removeItem('eden_customer_phone');
            localStorage.removeItem('eden_device_id');
            window.location.href = '/customer-login';
        }
        
        // Load dashboard on page load
        loadDashboard();
        
        // Refresh every 30 seconds
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
